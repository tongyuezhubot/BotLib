        <p class="kicker">控制</p>
        <h1>LQR 最小推导</h1>
        <p>系统模型：$$x_{t+1}=Ax_t+Bu_t$$</p>
        <p>代价函数：</p>
        <p>$$J=\sum_{t=0}^{T}(x_t^TQx_t+u_t^TRu_t)+x_T^TQ_fx_T$$</p>
        <p>最优控制律：</p>
        <p>$$u_t=-K_tx_t,\quad K_t=(R+B^TP_{t+1}B)^{-1}B^TP_{t+1}A$$</p>
        <p>里卡提递推：</p>
        <p>$$P_t=Q+A^TP_{t+1}A-A^TP_{t+1}B(R+B^TP_{t+1}B)^{-1}B^TP_{t+1}A$$</p>

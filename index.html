<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="从零开始的机器人学习博客，精简、清晰、可持续更新。" />
    <title>Robot Notes | 机器人学习博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <a class="logo" href="#top">Robot Notes</a>
      <nav class="nav" aria-label="主导航">
        <a href="#posts">文章</a>
        <a href="#topics">专题</a>
        <a href="#links">资源</a>
      </nav>
    </header>

    <main id="top" class="container">
      <section class="hero">
        <p class="kicker">从零开始 · 机器人学习</p>
        <h1>精简但完整的学习路径</h1>
        <p>
          每篇文章只讲一件事：概念、核心公式、最小代码和实验建议。
          目标是让你稳定积累，而不是堆砌信息。
        </p>
        <a href="#posts" class="btn">开始阅读</a>
      </section>

      <section id="posts" class="section">
        <div class="section-head">
          <h2>最新文章</h2>
          <button id="toggleBtn" class="ghost-btn" type="button">只看入门</button>
        </div>
        <div id="postGrid" class="post-grid"></div>
      </section>

      <section id="topics" class="section split">
        <article class="card">
          <h3>学习专题</h3>
          <ul>
            <li>数学与 Python 基础</li>
            <li>运动学与动力学</li>
            <li>状态估计与感知</li>
            <li>规划与控制</li>
            <li>强化学习与 Sim2Real</li>
          </ul>
        </article>
        <article id="links" class="card">
          <h3>常用资源</h3>
          <ul>
            <li><a href="https://www.ros.org/" target="_blank" rel="noreferrer">ROS / ROS2</a></li>
            <li><a href="https://pytorch.org/" target="_blank" rel="noreferrer">PyTorch</a></li>
            <li><a href="https://gymnasium.farama.org/" target="_blank" rel="noreferrer">Gymnasium</a></li>
            <li><a href="https://mujoco.org/" target="_blank" rel="noreferrer">MuJoCo</a></li>
          </ul>
        </article>
      </section>
    </main>

    <footer class="footer">
      <small>© <span id="year"></span> Robot Notes</small>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
